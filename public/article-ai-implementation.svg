<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="#F9FAFB"/>

  <!-- Staircase steps -->
  <!-- Step 1 -->
  <rect x="60" y="140" width="45" height="45" rx="3" fill="none" stroke="#0A0F1C" stroke-width="2"/>
  <rect x="65" y="145" width="35" height="35" fill="#F9FAFB" stroke="#34D399" stroke-width="1.5"/>

  <!-- Step 2 -->
  <rect x="125" y="105" width="45" height="45" rx="3" fill="none" stroke="#0A0F1C" stroke-width="2"/>
  <rect x="130" y="110" width="35" height="35" fill="#F9FAFB" stroke="#34D399" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="190" y="70" width="45" height="45" rx="3" fill="none" stroke="#0A0F1C" stroke-width="2"/>
  <rect x="195" y="75" width="35" height="35" fill="#F9FAFB" stroke="#34D399" stroke-width="1.5"/>

  <!-- Step 4 -->
  <rect x="255" y="35" width="45" height="45" rx="3" fill="none" stroke="#0A0F1C" stroke-width="2"/>
  <rect x="260" y="40" width="35" height="35" fill="#F9FAFB" stroke="#34D399" stroke-width="1.5"/>

  <!-- Step 5 -->
  <rect x="320" y="20" width="50" height="40" rx="3" fill="none" stroke="#0A0F1C" stroke-width="2" opacity="0.3"/>
  <rect x="324" y="24" width="42" height="32" fill="#F9FAFB" stroke="#10A37F" stroke-width="1.5" opacity="0.3"/>

  <!-- Gear/Cog icons on steps -->
  <!-- Gear 1 -->
  <g>
    <circle cx="82" cy="162" r="10" fill="none" stroke="#34D399" stroke-width="2"/>
    <rect x="79" y="152" width="2" height="20" fill="#34D399" rx="1"/>
    <rect x="85" y="152" width="2" height="20" fill="#34D399" rx="1"/>
    <rect x="72" y="159" width="20" height="2" fill="#34D399" rx="1"/>
    <rect x="72" y="165" width="20" height="2" fill="#34D399" rx="1"/>
    <circle cx="82" cy="162" r="4" fill="#34D399"/>
  </g>

  <!-- Gear 2 -->
  <g>
    <circle cx="147" cy="127" r="10" fill="none" stroke="#34D399" stroke-width="2"/>
    <rect x="144" y="117" width="2" height="20" fill="#34D399" rx="1"/>
    <rect x="150" y="117" width="2" height="20" fill="#34D399" rx="1"/>
    <rect x="137" y="124" width="20" height="2" fill="#34D399" rx="1"/>
    <rect x="137" y="130" width="20" height="2" fill="#34D399" rx="1"/>
    <circle cx="147" cy="127" r="4" fill="#34D399"/>
  </g>

  <!-- Gear 3 -->
  <g>
    <circle cx="212" cy="92" r="10" fill="none" stroke="#34D399" stroke-width="2"/>
    <rect x="209" y="82" width="2" height="20" fill="#34D399" rx="1"/>
    <rect x="215" y="82" width="2" height="20" fill="#34D399" rx="1"/>
    <rect x="202" y="89" width="20" height="2" fill="#34D399" rx="1"/>
    <rect x="202" y="95" width="20" height="2" fill="#34D399" rx="1"/>
    <circle cx="212" cy="92" r="4" fill="#34D399"/>
  </g>

  <!-- Gear 4 -->
  <g>
    <circle cx="277" cy="57" r="10" fill="none" stroke="#10A37F" stroke-width="2"/>
    <rect x="274" y="47" width="2" height="20" fill="#10A37F" rx="1"/>
    <rect x="280" y="47" width="2" height="20" fill="#10A37F" rx="1"/>
    <rect x="267" y="54" width="20" height="2" fill="#10A37F" rx="1"/>
    <rect x="267" y="60" width="20" height="2" fill="#10A37F" rx="1"/>
    <circle cx="277" cy="57" r="4" fill="#10A37F"/>
  </g>

  <!-- Upward arrow -->
  <!-- Arrow shaft -->
  <line x1="320" y1="100" x2="345" y2="40" stroke="#10A37F" stroke-width="3" opacity="0.8"/>

  <!-- Arrow head -->
  <polygon points="345,40 338,52 352,48" fill="#10A37F" opacity="0.8"/>

  <!-- Connecting lines between steps -->
  <line x1="105" y1="135" x2="130" y2="115" stroke="#34D399" stroke-width="1.5" opacity="0.5" stroke-dasharray="2,2"/>
  <line x1="170" y1="100" x2="195" y2="80" stroke="#34D399" stroke-width="1.5" opacity="0.5" stroke-dasharray="2,2"/>
  <line x1="235" y1="65" x2="260" y2="45" stroke="#34D399" stroke-width="1.5" opacity="0.5" stroke-dasharray="2,2"/>
</svg>