<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="#F9FAFB"/>

  <!-- Open book base -->
  <!-- Left page -->
  <path d="M 80 60 Q 100 55 120 60 L 120 155 Q 100 150 80 155 Z" fill="#34D399" stroke="#10A37F" stroke-width="2"/>

  <!-- Right page -->
  <path d="M 120 60 Q 140 55 160 60 L 160 155 Q 140 150 120 155 Z" fill="#34D399" stroke="#10A37F" stroke-width="2" opacity="0.7"/>

  <!-- Book spine -->
  <line x1="120" y1="60" x2="120" y2="155" stroke="#10A37F" stroke-width="2.5"/>

  <!-- Text lines on left page -->
  <line x1="90" y1="75" x2="115" y2="75" stroke="#0A0F1C" stroke-width="1.5" opacity="0.4"/>
  <line x1="90" y1="85" x2="110" y2="85" stroke="#0A0F1C" stroke-width="1.5" opacity="0.4"/>
  <line x1="90" y1="95" x2="115" y2="95" stroke="#0A0F1C" stroke-width="1.5" opacity="0.4"/>

  <!-- Neural network lines emanating upward -->
  <!-- Main node -->
  <circle cx="120" cy="50" r="7" fill="#10A37F" stroke="#34D399" stroke-width="1.5"/>

  <!-- Upper left branch -->
  <line x1="115" y1="45" x2="80" y2="20" stroke="#34D399" stroke-width="2" opacity="0.7"/>
  <circle cx="80" cy="20" r="5" fill="#34D399"/>
  <line x1="80" y1="20" x2="60" y2="10" stroke="#10A37F" stroke-width="1.5" opacity="0.5"/>
  <circle cx="60" cy="10" r="3" fill="#10A37F" opacity="0.6"/>

  <!-- Upper branch -->
  <line x1="120" y1="43" x2="120" y2="15" stroke="#34D399" stroke-width="2" opacity="0.7"/>
  <circle cx="120" cy="15" r="5" fill="#34D399"/>
  <line x1="120" y1="15" x2="140" y2="5" stroke="#10A37F" stroke-width="1.5" opacity="0.5"/>
  <circle cx="140" cy="5" r="3" fill="#10A37F" opacity="0.6"/>

  <!-- Upper right branch -->
  <line x1="125" y1="45" x2="160" y2="20" stroke="#34D399" stroke-width="2" opacity="0.7"/>
  <circle cx="160" cy="20" r="5" fill="#34D399"/>
  <line x1="160" y1="20" x2="180" y2="10" stroke="#10A37F" stroke-width="1.5" opacity="0.5"/>
  <circle cx="180" cy="10" r="3" fill="#10A37F" opacity="0.6"/>

  <!-- Right upper branch -->
  <line x1="128" y1="48" x2="180" y2="30" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <circle cx="180" cy="30" r="4.5" fill="#34D399"/>
  <line x1="180" y1="30" x2="210" y2="20" stroke="#10A37F" stroke-width="1.5" opacity="0.5"/>
  <circle cx="210" cy="20" r="3" fill="#10A37F" opacity="0.6"/>

  <!-- Circuit elements -->
  <!-- Small connecting paths -->
  <line x1="100" y1="35" x2="90" y2="40" stroke="#10A37F" stroke-width="1" opacity="0.4"/>
  <line x1="140" y1="32" x2="155" y2="38" stroke="#10A37F" stroke-width="1" opacity="0.4"/>

  <!-- Small accent nodes in the network -->
  <circle cx="95" cy="32" r="2.5" fill="#34D399" opacity="0.5"/>
  <circle cx="145" cy="28" r="2.5" fill="#34D399" opacity="0.5"/>
  <circle cx="170" cy="35" r="2.5" fill="#34D399" opacity="0.5"/>

  <!-- Decorative gradient effect zones -->
  <circle cx="150" cy="60" r="30" fill="none" stroke="#34D399" stroke-width="1" opacity="0.2"/>
  <circle cx="150" cy="60" r="20" fill="none" stroke="#10A37F" stroke-width="1" opacity="0.15"/>
</svg>