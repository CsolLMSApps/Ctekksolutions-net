<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Background accent shape -->
  <rect x="0" y="0" width="44" height="44" rx="10" fill="#10A37F"/>
  <text x="22" y="30" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">CS</text>

  <!-- CSOL main text -->
  <text x="56" y="24" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#111111" letter-spacing="2">CSOL</text>

  <!-- Gradient underline -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10A37F"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect x="56" y="30" width="80" height="2.5" rx="1.25" fill="url(#grad)"/>

  <!-- C.Tekk Solutions Inc -->
  <text x="56" y="48" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#6B7280" letter-spacing="0.8">C.Tekk Solutions Inc</text>

  <!-- Small accent dots -->
  <circle cx="250" cy="14" r="3" fill="#10A37F" opacity="0.6"/>
  <circle cx="260" cy="14" r="3" fill="#06B6D4" opacity="0.4"/>
  <circle cx="270" cy="14" r="3" fill="#3B82F6" opacity="0.3"/>
</svg>
